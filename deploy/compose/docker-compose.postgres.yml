services:
  ai-police:
    env_file:
      - ../../.env
    environment:
      AI_POLICE_HOST: 0.0.0.0
      AI_POLICE_DATABASE_URL: postgresql+psycopg://ai_police:change-me@postgres:5432/ai_police
    depends_on:
      - postgres
    ports:
      - "${AI_POLICE_PORT:-8000}:${AI_POLICE_PORT:-8000}"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_police
      POSTGRES_USER: ai_police
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
